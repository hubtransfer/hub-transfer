<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HUB Transfer · Karolini Duarte</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--surface:#0f1320;--surface2:#141929;--border:#1d2840;--border2:#242f4a;
  --chegada:#f59e0b;--chegada-dim:rgba(245,158,11,.12);
  --recolha:#10b981;--recolha-dim:rgba(16,185,129,.12);--recolha-glow:rgba(16,185,129,.3);
  --tour:#a855f7;--tour-dim:rgba(168,85,247,.12);
  --text:#dde4f0;--text-dim:#8294b0;--text-muted:#2d3a52;
  --accent:#3b82f6;--accent-dim:rgba(59,130,246,.14);
  --wpp:#25d366;
  --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

.topbar{height:52px;border-bottom:1px solid var(--border);background:rgba(7,9,15,.98);display:flex;align-items:center;padding:0 1rem;gap:.8rem;position:sticky;top:0;z-index:100}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,#f59e0b,#3b82f6);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
.drv-name{font-size:.85rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.drv-sub{font-family:var(--mono);font-size:.48rem;color:var(--text-dim);letter-spacing:.1em}
.clock{font-family:var(--mono);font-size:.7rem;color:var(--chegada);margin-left:auto}

.main{padding:.8rem;display:flex;flex-direction:column;gap:.55rem;max-width:600px;margin:0 auto}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem}
.stat{padding:.6rem .3rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;text-align:center}
.stat-n{font-family:var(--mono);font-size:1.5rem;font-weight:700;line-height:1}
.stat-l{font-family:var(--mono);font-size:.48rem;color:var(--text-dim);letter-spacing:.07em;text-transform:uppercase;margin-top:2px}
.stat.s-t .stat-n{color:var(--accent)}
.stat.s-c .stat-n{color:var(--chegada)}
.stat.s-r .stat-n{color:var(--recolha)}

.sync-bar{display:flex;align-items:center;gap:.4rem;padding:.45rem .7rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-family:var(--mono);font-size:.55rem;color:var(--text-dim)}
.sync-bar strong{color:var(--text)}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-dot.ok{background:var(--recolha)}
.sync-dot.err{background:#ef4444}
.sync-dot.load{background:var(--chegada);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.section-lbl{font-family:var(--mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:.5rem 0 .2rem;border-bottom:1px solid var(--border);margin-bottom:.15rem}

/* ── CARD ── */
.vc{border-radius:9px;overflow:hidden;border:1px solid var(--border);background:var(--surface);margin-bottom:.5rem}
.vc.vc-chegada{border-left:4px solid var(--chegada)}
.vc.vc-recolha{border-left:4px solid var(--recolha)}
.vc.vc-tour{border-left:4px solid var(--tour)}

.vc-head{display:flex;align-items:center;gap:.6rem;padding:.55rem .75rem;border-bottom:1px solid var(--border)}
.vc-hora{font-family:var(--mono);font-size:1.3rem;font-weight:700;line-height:1;min-width:52px}
.vc-chegada .vc-hora{color:var(--chegada)}
.vc-recolha .vc-hora{color:var(--recolha)}
.vc-tour .vc-hora{color:var(--tour)}
.vc-tipo{font-family:var(--mono);font-size:.5rem;color:var(--text-muted);letter-spacing:.07em;text-transform:uppercase}
.vc-client{font-size:1rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vc-pax{font-family:var(--mono);font-size:.55rem;padding:.1rem .35rem;border-radius:3px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);white-space:nowrap}

/* Flight block */
.vc-flight{padding:.5rem .75rem;border-bottom:1px solid var(--border);background:rgba(245,158,11,.04)}
.vc-frow{display:flex;align-items:center;gap:.4rem}
.vc-fcode{font-family:var(--mono);font-size:1.1rem;font-weight:700;text-align:center;min-width:42px}
.vc-fcity{font-family:var(--mono);font-size:.48rem;color:var(--text-dim);text-align:center}
.vc-fmid{flex:1;text-align:center}
.vc-fnum{font-family:var(--mono);font-size:.55rem;color:var(--chegada)}
.vc-ftrack{height:3px;background:var(--border);border-radius:2px;position:relative;margin:.25rem 0}
.vc-fprog{height:100%;width:60%;background:linear-gradient(90deg,var(--chegada),transparent);border-radius:2px}
.vc-fplane{position:absolute;left:58%;top:50%;transform:translate(-50%,-50%);font-size:.8rem;color:var(--chegada)}
.vc-ftimes{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.52rem;color:var(--text)}
.vc-origin-hint{display:inline-flex;align-items:center;gap:.25rem;padding:.12rem .4rem;border-radius:3px;font-family:var(--mono);font-size:.48rem;margin-top:.2rem}
.vc-origin-hint.eu{background:rgba(59,130,246,.1);color:#60a5fa}
.vc-origin-hint.inter{background:rgba(245,158,11,.1);color:var(--chegada)}
.vc-origin-hint.long{background:rgba(239,68,68,.1);color:#f87171}

/* Route block (recolha) */
.vc-route{padding:.5rem .75rem;border-bottom:1px solid var(--border);background:rgba(16,185,129,.04)}
.vc-route-row{display:flex;align-items:stretch;gap:.5rem}
.vc-dots{display:flex;flex-direction:column;align-items:center;width:14px;padding:.15rem 0}
.vc-dot-a{width:8px;height:8px;border-radius:50%;background:var(--recolha);flex-shrink:0}
.vc-dot-line{flex:1;width:2px;background:var(--recolha-glow);margin:2px auto}
.vc-dot-b{width:8px;height:8px;border-radius:2px;background:var(--accent);flex-shrink:0}
.vc-addrs{flex:1;display:flex;flex-direction:column;gap:.3rem}
.vc-addr-lbl{font-family:var(--mono);font-size:.48rem;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase}
.vc-addr-val{font-family:var(--mono);font-size:.58rem;color:var(--text);line-height:1.3}

/* Tour block */
.vc-tour-block{padding:.5rem .75rem;border-bottom:1px solid var(--border);background:rgba(168,85,247,.04)}

/* Nav buttons */
.vc-nav{display:flex;gap:.3rem;margin-top:.2rem}
.vc-nav a{font-family:var(--mono);font-size:.52rem;padding:.15rem .4rem;border-radius:3px;text-decoration:none;white-space:nowrap}
.vc-nav .gm{background:rgba(66,133,244,.1);border:1px solid rgba(66,133,244,.25);color:#4285f4}
.vc-nav .wz{background:rgba(53,197,240,.1);border:1px solid rgba(53,197,240,.25);color:#35c5f0}

/* WhatsApp */
.vc-wpp{display:flex;align-items:center;justify-content:center;gap:.3rem;padding:.45rem;border-top:1px solid var(--border);background:rgba(37,211,102,.06);color:var(--wpp);font-family:var(--mono);font-size:.6rem;font-weight:700;text-decoration:none;transition:background .15s;cursor:pointer;border:none;border-top:1px solid var(--border);width:100%}
.vc-wpp:hover{background:rgba(37,211,102,.14)}

/* ── PLACA NOME CLIENTE (fullscreen landscape) ── */
.nameplate{position:fixed;inset:0;z-index:9999;background:#0a0a0a;display:none;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.nameplate.open{display:flex}
.nameplate-logo{font-family:var(--mono);font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(245,158,11,.4);margin-bottom:.5rem}
.nameplate-name{font-family:var(--sans);font-weight:800;color:#f59e0b;text-align:center;text-transform:uppercase;letter-spacing:.06em;line-height:1.1;word-break:break-word;max-width:95vw;/* font-size is set dynamically by JS */}
.nameplate-hint{position:absolute;bottom:1.2rem;font-family:var(--mono);font-size:.55rem;color:rgba(255,255,255,.15);letter-spacing:.1em}
/* Force landscape hint */
@media (orientation:portrait){
  .nameplate-rotate{display:flex;align-items:center;gap:.4rem;margin-top:1rem;font-family:var(--mono);font-size:.55rem;color:rgba(255,255,255,.2);letter-spacing:.06em}
  .nameplate-rotate .rot-ico{display:inline-block;animation:rotHint 2s ease-in-out infinite}
  @keyframes rotHint{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
}
@media (orientation:landscape){
  .nameplate-rotate{display:none}
}

.empty{text-align:center;padding:3rem 1rem;color:var(--text-muted);font-family:var(--mono);font-size:.65rem;line-height:2}
.error-msg{text-align:center;padding:1.5rem;color:#f87171;font-family:var(--mono);font-size:.6rem}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-mark">🚗</div>
  <div>
    <div class="drv-name" id="drvName">Motorista</div>
    <div class="drv-sub">HUB Transfer</div>
  </div>
  <div class="clock" id="clock">--:--</div>
</div>

<div class="main" id="main">
  <div class="empty">A carregar viagens...</div>
</div>

<script>
/* ── CONFIG ── */
const MOTORISTA = 'Karolini Duarte';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwwr4_wjibbZgVEDD7JC0VSYce7C8iIvSmJFSbDHO_IX1L5KHSagOxkJZOL0ya746Uicw/exec';

document.getElementById('drvName').textContent = MOTORISTA;
document.title = `HUB · ${MOTORISTA}`;

/* ── CLOCK ── */
function tick(){
  const n=new Date(),o={timeZone:'Europe/Lisbon'};
  document.getElementById('clock').textContent=n.toLocaleString('pt-PT',{...o,hour:'2-digit',minute:'2-digit'});
}
setInterval(tick,1000);tick();

/* ── DETECT TIPO ── */
function detectTipo(origin,flight){
  const o=String(origin||'').toLowerCase();
  const isApt=o.includes('aeroporto')||o.includes('airport')||o.includes('humberto delgado')||o.includes('portela');
  const hasF=!!(flight&&String(flight).trim()&&String(flight).trim()!=='.');
  if(isApt&&hasF)return'CHEGADA';
  if(!isApt)return'RECOLHA';
  return'TOUR';
}

/* ── TEMPLATES DO CLIENTE — idênticos ao HUB Central ── */
const TEMPLATES={
  CHEGADA:{
    PT:(m,c)=>`Oi, ${c}! 👋 Aqui é o ${m}, da HUB Transfer.\nBem-vindo(a) a Portugal! 🇵🇹 Espero que o voo tenha sido tranquilo.\nVou te ajudar a sair do aeroporto sem stress.\n\nEstou enviando a foto abaixo para facilitar chegar no nosso ponto de encontro.\n\nPor favor, me avisa quando:\n1️⃣ Passar pelo controle de passaportes\n2️⃣ Estiver com as malas na mão\n\nTe vejo em breve! Se precisar de algo, pode me enviar uma mensagem. 👍`,
    EN:(m,c)=>`Hi ${c}! 👋 I'm ${m}, from HUB Transfer.\nWelcome to Portugal! 🇵🇹 I hope you had a pleasant flight.\nI'm here to make your arrival stress-free.\n\nI'm sending the photo below to help you find our meeting point.\n\nPlease let me know when:\n1️⃣ You pass through passport control\n2️⃣ You have your luggage ready\n\nSee you soon! If you need anything, just send me a message. 👍`,
    ES:(m,c)=>`¡Hola, ${c}! 👋 Soy ${m}, de HUB Transfer.\n¡Bienvenido(a) a Portugal! 🇵🇹 Espero que el vuelo haya sido tranquilo.\nTe ayudaré a salir del aeropuerto sin estrés.\n\nTe envío la foto abajo para facilitar que llegues a nuestro punto de encuentro.\n\nPor favor, avísame cuando:\n1️⃣ Pases el control de pasaportes\n2️⃣ Tengas tus maletas contigo\n\n¡Te veo pronto! Si necesitas algo, puedes enviarme un mensaje. 👍`,
    FR:(m,c)=>`Bonjour ${c} ! 👋 C'est ${m}, de HUB Transfer.\nBienvenue au Portugal ! 🇵🇹 J'espère que vous avez fait un bon vol.\nJe vais vous aider à quitter l'aéroport sans stress.\n\nJe vous envoie la photo ci-dessous pour vous aider à trouver notre point de rencontre.\n\nMerci de me prévenir quand :\n1️⃣ Vous passez le contrôle des passeports\n2️⃣ Vous avez récupéré vos bagages\n\nÀ très vite ! Si vous avez besoin de quelque chose, envoyez-moi un message. 👍`,
    IT:(m,c)=>`Ciao ${c}! 👋 Sono ${m}, di HUB Transfer.\nBenvenuto(a) in Portogallo! 🇵🇹 Spero che il volo sia stato tranquillo.\nTi aiuterò a uscire dall'aeroporto senza stress.\n\nTi invio la foto qui sotto per aiutarti a trovare il nostro punto di incontro.\n\nPer favore, avvisami quando:\n1️⃣ Passi il controllo passaporti\n2️⃣ Hai preso i bagagli\n\nCi vediamo presto! Se hai bisogno di qualcosa, mandami un messaggio. 👍`,
    DE:(m,c)=>`Hallo ${c}! 👋 Ich bin ${m}, von HUB Transfer.\nWillkommen in Portugal! 🇵🇹 Ich hoffe, Sie hatten einen angenehmen Flug.\nIch helfe Ihnen, den Flughafen stressfrei zu verlassen.\n\nIch schicke Ihnen das Foto unten, um Ihnen zu helfen, unseren Treffpunkt zu finden.\n\nBitte geben Sie mir Bescheid, wenn:\n1️⃣ Sie durch die Passkontrolle gehen\n2️⃣ Sie Ihr Gepäck haben\n\nBis gleich! Wenn Sie etwas brauchen, schicken Sie mir einfach eine Nachricht. 👍`,
  },
  RECOLHA:{
    PT:(m,c,o,h)=>`Olá, ${c}! 👋 Aqui é o ${m}, da HUB Transfer.\nSou o motorista responsável pelo seu transfer de hoje.\n\n📍 Estarei em *${o||'sua morada'}* no horário combinado: *${h||'—'}*\n\nQuando eu chegar, vou te avisar por aqui! 😊\n\nSe precisar de algo ou houver qualquer alteração, me avise por aqui. 👍`,
    EN:(m,c,o,h)=>`Hello, ${c}! 👋 I'm ${m}, from HUB Transfer.\nI'm the driver for your transfer today.\n\n📍 I'll be at *${o||'your address'}* at the scheduled time: *${h||'—'}*\n\nI'll let you know when I arrive! 😊\n\nIf you need anything or there are any changes, just message me here. 👍`,
    ES:(m,c,o,h)=>`¡Hola, ${c}! 👋 Soy ${m}, de HUB Transfer.\nSoy el conductor de su transfer de hoy.\n\n📍 Estaré en *${o||'su dirección'}* a la hora acordada: *${h||'—'}*\n\n¡Te avisaré cuando llegue! 😊\n\nSi necesita algo o hay algún cambio, escríbame por aquí. 👍`,
    FR:(m,c,o,h)=>`Bonjour ${c} ! 👋 C'est ${m}, de HUB Transfer.\nJe suis le chauffeur pour votre transfert aujourd'hui.\n\n📍 Je serai à *${o||'votre adresse'}* à l'heure prévue : *${h||'—'}*\n\nJe vous préviendrai quand j'arriverai ! 😊\n\nSi vous avez besoin de quoi que ce soit, envoyez-moi un message ici. 👍`,
    IT:(m,c,o,h)=>`Ciao ${c}! 👋 Sono ${m}, di HUB Transfer.\nSono l'autista per il tuo transfer di oggi.\n\n📍 Sarò a *${o||'il tuo indirizzo'}* all'orario previsto: *${h||'—'}*\n\nTi avviserò quando arrivo! 😊\n\nSe hai bisogno di qualcosa o ci sono cambiamenti, scrivimi qui. 👍`,
    DE:(m,c,o,h)=>`Hallo ${c}! 👋 Ich bin ${m}, von HUB Transfer.\nIch bin der Fahrer für Ihren Transfer heute.\n\n📍 Ich werde um *${h||'—'}* an *${o||'Ihrer Adresse'}* sein.\n\nIch gebe Ihnen Bescheid, wenn ich ankomme! 😊\n\nWenn Sie etwas brauchen, schreiben Sie mir hier. 👍`,
  },
  TOUR:{
    PT:(m,c,o,h)=>`Olá, ${c}! 👋 Aqui é o ${m}, da HUB Transfer.\nEstou confirmando o seu transfer de hoje.\n\n📍 Estarei em *${o||'sua morada'}* às *${h||'—'}*\n\nQualquer dúvida, é só me enviar uma mensagem aqui. 😊 👍`,
    EN:(m,c,o,h)=>`Hello, ${c}! 👋 I'm ${m}, from HUB Transfer.\nConfirming your transfer for today.\n\n📍 I'll be at *${o||'your address'}* at *${h||'—'}*\n\nFeel free to message me here if you need anything. 😊 👍`,
    ES:(m,c,o,h)=>`¡Hola, ${c}! 👋 Soy ${m}, de HUB Transfer.\nConfirmando su transfer para hoy.\n\n📍 Estaré en *${o||'su dirección'}* a las *${h||'—'}*\n\nPuede escribirme aquí si necesita algo. 😊 👍`,
    FR:(m,c,o,h)=>`Bonjour ${c} ! 👋 C'est ${m}, de HUB Transfer.\nJe confirme votre transfert pour aujourd'hui.\n\n📍 Je serai à *${o||'votre adresse'}* à *${h||'—'}*\n\nN'hésitez pas à m'écrire si vous avez besoin de quoi que ce soit. 😊 👍`,
    IT:(m,c,o,h)=>`Ciao ${c}! 👋 Sono ${m}, di HUB Transfer.\nConferma del tuo transfer per oggi.\n\n📍 Sarò a *${o||'il tuo indirizzo'}* alle *${h||'—'}*\n\nScrivimi qui se hai bisogno di qualcosa. 😊 👍`,
    DE:(m,c,o,h)=>`Hallo ${c}! 👋 Ich bin ${m}, von HUB Transfer.\nIch bestätige Ihren Transfer für heute.\n\n📍 Ich werde um *${h||'—'}* an *${o||'Ihrer Adresse'}* sein.\n\nSchreiben Sie mir hier, wenn Sie etwas brauchen. 😊 👍`,
  },
};
function clientMsg(phone, tipo, client, lang, origin, hora){
  if(!phone){ alert('⚠️ Cliente sem número de telefone.'); return; }
  const fn = TEMPLATES[tipo]?.[lang] || TEMPLATES[tipo]?.EN || TEMPLATES[tipo]?.PT;
  if(!fn){ return; }
  const txt = fn(MOTORISTA, client, origin, hora);
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(txt)}`, '_blank');
}

/* ── IATA — mesma base do painel principal ── */

},MLA:{r:'sch',c:'🇲🇹 Malta'},

function regionHint(iata){
  const info=iata?IATA_DATA[iata.toUpperCase()]:null;
  if(!info)return null;
  const r=info.r;
  let text=info.c;
  if(r==='sch')text+=' · Schengen · ~15-25min';
  else if(r==='uk')text+=' · Controlo passaportes · ~40-60min';
  else if(r==='eur')text+=' · Controlo passaportes · ~30-45min';
  else if(r==='na')text+=' · ~45-60min';
  else if(r==='africa')text+=' · ~45-60min';
  else if(r==='mideast')text+=' · ~45-60min';
  else if(r==='latam')text+=' · ~50-75min';
  else if(r==='brazil')text+=' · Voo longo · ~60-90min';
  else if(r==='asia')text+=' · ~60-90min';
  const cls=(r==='sch')?'eu':(r==='brazil'||r==='latam'||r==='asia')?'long':'inter';
  return{text,cls};
}

/* ── SYNC ── */
let viagens = [];

function sanitizeViagens(rawList){
  /* Filtra SÓ as viagens deste motorista e remove qualquer campo que exponha dados da empresa */
  return rawList
    .filter(v => (v.driver||'').toLowerCase().trim() === MOTORISTA.toLowerCase().trim())
    .map(v => ({
      /* Só guardar o que o motorista precisa ver */
      id: v.id,
      client: v.client,
      phone: v.phone,
      origin: v.origin,
      destination: v.destination,
      pickupTime: v.pickupTime,
      flight: v.flight,
      language: v.language,
      pax: v.pax,
      bags: v.bags,
      type: v.type,
      depAirport: v.depAirport, depIata: v.depIata,
      arrAirport: v.arrAirport, arrIata: v.arrIata,
      depCity: v.depCity, arrCity: v.arrCity,
      depTime: v.depTime, arrTime: v.arrTime,
      depTerminal: v.depTerminal, arrTerminal: v.arrTerminal,
      /* Não guardar: driver (redundante, é ele), nem qualquer campo interno */
    }));
}

async function syncViagens(){
  if(!MOTORISTA||!GAS_URL) return;
  const main = document.getElementById('main');
  try{
    const resp = await fetch(GAS_URL + '?action=motorista&nome=' + encodeURIComponent(MOTORISTA) + '&t=' + Date.now(), {redirect:'follow'});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const data = await resp.json();
    const raw = Array.isArray(data) ? data : (data.viagens || []);
    viagens = sanitizeViagens(raw);
    render();
  } catch(err){
    try {
      const resp2 = await fetch(GAS_URL + '?action=viagens&t=' + Date.now(), {redirect:'follow'});
      if(!resp2.ok) throw new Error('HTTP '+resp2.status);
      const data2 = await resp2.json();
      const raw2 = Array.isArray(data2) ? data2 : (data2.viagens || []);
      viagens = sanitizeViagens(raw2);
      render();
    } catch(err2){
      main.innerHTML = `<div class="error-msg">⚠️ Erro ao sincronizar: ${err2.message}</div>`;
    }
  }
}

/* ── RENDER ── */
function render(){
  const main = document.getElementById('main');
  const today = new Date().toLocaleDateString('pt-PT',{timeZone:'Europe/Lisbon',day:'2-digit',month:'2-digit',year:'numeric'});
  const nc = viagens.filter(v=>detectTipo(v.origin,v.flight)==='CHEGADA').length;
  const nr = viagens.filter(v=>detectTipo(v.origin,v.flight)==='RECOLHA').length;
  const nt = viagens.filter(v=>detectTipo(v.origin,v.flight)==='TOUR').length;

  let html = '';

  // Stats
  html += `<div class="stats">
    <div class="stat s-t"><div class="stat-n">${viagens.length}</div><div class="stat-l">Total</div></div>
    <div class="stat s-c"><div class="stat-n">${nc}</div><div class="stat-l">Chegadas</div></div>
    <div class="stat s-r"><div class="stat-n">${nr+nt}</div><div class="stat-l">Recolhas</div></div>
  </div>`;

  // Sync info
  const ts = new Date().toLocaleString('pt-PT',{timeZone:'Europe/Lisbon',hour:'2-digit',minute:'2-digit'});
  html += `<div class="sync-bar"><div class="sync-dot ok"></div><strong>${today}</strong> · Actualizado ${ts}</div>`;

  if(!viagens.length){
    html += `<div class="empty">📋 Nenhuma viagem atribuída para hoje.</div>`;
    main.innerHTML = html;
    return;
  }

  // Ordenar por hora
  viagens.sort((a,b)=>{
    const ha = String(a.pickupTime||'99:99').match(/(\d{1,2}):(\d{2})/);
    const hb = String(b.pickupTime||'99:99').match(/(\d{1,2}):(\d{2})/);
    const ma = ha ? parseInt(ha[1])*60+parseInt(ha[2]) : 9999;
    const mb = hb ? parseInt(hb[1])*60+parseInt(hb[2]) : 9999;
    return ma - mb;
  });

  viagens.forEach(v => {
    const tipo = detectTipo(v.origin, v.flight);
    const isC = tipo==='CHEGADA', isR = tipo==='RECOLHA', isT = tipo==='TOUR';
    const tc = isC?'vc-chegada':isT?'vc-tour':'vc-recolha';
    let hora = '—:—';
    if(v.pickupTime){const m=String(v.pickupTime).match(/(\d{1,2}):(\d{2})/);hora=m?`${m[1].padStart(2,'0')}:${m[2]}`:'—:—';}
    const origem = v.origin||'—';
    const destino = v.destination||'—';
    const pax = v.pax ? `<span class="vc-pax">👤 ${v.pax}</span>` : '';
    const bags = v.bags ? `<span class="vc-pax">🧳 ${v.bags}</span>` : '';

    html += `<div class="vc ${tc}">`;

    // Head
    html += `<div class="vc-head">
      <div><div class="vc-hora">${hora}</div><div class="vc-tipo">${isC?'✈ Chegada':isT?'🧭 Tour':'🚗 Recolha'}</div></div>
      <div class="vc-client" onclick="showNameplate('${(v.client||'').replace(/'/g,"\\'")}')" style="cursor:pointer;text-decoration:underline;text-decoration-color:rgba(245,158,11,.3);text-underline-offset:3px">${v.client||'—'}</div>
      ${pax}${bags}
    </div>`;

    // Middle
    if(isC && v.flight){
      const dep=(v.depAirport||v.depIata||'???').toUpperCase();
      const arr=(v.arrAirport||v.arrIata||'LIS').toUpperCase();
      const depC=v.depCity||'';const arrC=v.arrCity||'Lisboa';
      const depT=v.depTime||'—:—';const arrT=v.arrTime||'—:—';
      const rh=regionHint(dep);
      html += `<div class="vc-flight">
        <div class="vc-frow">
          <div><div class="vc-fcode">${dep}</div><div class="vc-fcity">${depC}</div></div>
          <div class="vc-fmid">
            <div class="vc-fnum">${v.flight}</div>
            <div class="vc-ftrack"><div class="vc-fprog"></div><span class="vc-fplane">✈</span></div>
            <div class="vc-ftimes"><span>${depT}</span><span>${arrT}</span></div>
            ${rh?`<div class="vc-origin-hint ${rh.cls}">${rh.text}</div>`:''}
          </div>
          <div><div class="vc-fcode" style="color:var(--chegada)">${arr}</div><div class="vc-fcity">${arrC}</div></div>
        </div>
        <div class="vc-nav" style="margin-top:.35rem">
          <a class="gm" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destino)}" target="_blank">🗺 Maps Destino</a>
          <a class="wz" href="https://waze.com/ul?q=${encodeURIComponent(destino)}&navigate=yes" target="_blank">🔷 Waze</a>
        </div>
      </div>`;
    } else if(isR){
      html += `<div class="vc-route"><div class="vc-route-row">
        <div class="vc-dots"><div class="vc-dot-a"></div><div class="vc-dot-line"></div><div class="vc-dot-b"></div></div>
        <div class="vc-addrs">
          <div><div class="vc-addr-lbl">📍 Recolha</div><div class="vc-addr-val">${origem}</div>
          <div class="vc-nav"><a class="gm" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(origem)}" target="_blank">🗺 Maps</a><a class="wz" href="https://waze.com/ul?q=${encodeURIComponent(origem)}&navigate=yes" target="_blank">🔷 Waze</a></div></div>
          <div style="margin-top:.25rem"><div class="vc-addr-lbl">✈ Destino</div><div class="vc-addr-val">${destino}</div>
          <div class="vc-nav"><a class="gm" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destino)}" target="_blank">🗺 Maps</a><a class="wz" href="https://waze.com/ul?q=${encodeURIComponent(destino)}&navigate=yes" target="_blank">🔷 Waze</a></div></div>
        </div>
      </div></div>`;
    } else {
      html += `<div class="vc-tour-block">
        <div style="display:flex;align-items:center;gap:.5rem"><div style="font-size:1.3rem">🧭</div><div>
          <div class="vc-addr-lbl">📍 Ponto de encontro</div><div class="vc-addr-val">${origem}</div>
          <div class="vc-nav"><a class="gm" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(origem)}" target="_blank">🗺 Maps</a><a class="wz" href="https://waze.com/ul?q=${encodeURIComponent(origem)}&navigate=yes" target="_blank">🔷 Waze</a></div>
        </div></div>
      </div>`;
    }

    // WhatsApp cliente — com template e nome do motorista
    if(v.phone){
      const _cl = (v.client||'').replace(/'/g,"\\'");
      const _or = (origem||'').replace(/'/g,"\\'");
      const _lang = v.language||'EN';
      const _ph = v.phone.replace(/\D/g,'');
      html += `<button class="vc-wpp" onclick="clientMsg('${_ph}','${tipo}','${_cl}','${_lang}','${_or}','${hora}')">💬 WhatsApp Cliente</button>`;
    }

    html += `</div>`;
  });

  main.innerHTML = html;
}

/* ═══ PLACA NOME CLIENTE — fullscreen ═══ */
function showNameplate(name){
  let ov = document.getElementById('nameplate');
  if(!ov){
    ov = document.createElement('div');
    ov.id = 'nameplate';
    ov.className = 'nameplate';
    ov.innerHTML = `
      <div class="nameplate-logo">HUB TRANSFER</div>
      <div class="nameplate-name" id="npName"></div>
      <div class="nameplate-rotate"><span class="rot-ico">📱</span> Deita o telemóvel para placa maior</div>
      <div class="nameplate-hint">toca para fechar</div>
    `;
    ov.onclick = ()=>{ ov.classList.remove('open'); document.body.style.overflow=''; };
    document.body.appendChild(ov);
  }
  const el = document.getElementById('npName');
  el.textContent = name;
  /* Tamanho responsivo — o maior possível que caiba no ecrã */
  let sz = 18;
  el.style.fontSize = sz + 'vw';
  ov.classList.add('open');
  document.body.style.overflow = 'hidden';
  requestAnimationFrame(()=>{
    const maxW = window.innerWidth * 0.92;
    const maxH = window.innerHeight * 0.55;
    while((el.scrollWidth > maxW || el.scrollHeight > maxH) && sz > 3){
      sz -= 0.5;
      el.style.fontSize = sz + 'vw';
    }
  });
}

// ── INIT ──
if(MOTORISTA){
  syncViagens();
  setInterval(syncViagens, 120000); // Auto-refresh 2 min
}
